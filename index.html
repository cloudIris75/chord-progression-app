<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>코드 진행 추천기</title>
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a24;
    --surface2: #232333;
    --border: #2e2e42;
    --accent: #7c6dfa;
    --accent2: #c084fc;
    --accent3: #38bdf8;
    --text: #e2e2f0;
    --text-muted: #8888aa;
    --success: #34d399;
    --warning: #fbbf24;
    --card-shadow: 0 4px 24px rgba(0,0,0,0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    padding: 24px 16px 60px;
  }

  header {
    text-align: center;
    margin-bottom: 40px;
  }

  header .logo {
    font-size: 2rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.5px;
  }

  header .subtitle {
    color: var(--text-muted);
    margin-top: 6px;
    font-size: 0.95rem;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
  }

  .section-label {
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 12px;
  }

  .chip-group {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 28px;
  }

  .chip {
    padding: 8px 16px;
    border-radius: 999px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    font-size: 0.88rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.18s ease;
    user-select: none;
  }

  .chip:hover {
    border-color: var(--accent);
    color: var(--text);
  }

  .chip.active {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-color: transparent;
    color: #fff;
    font-weight: 700;
    box-shadow: 0 0 16px rgba(124,109,250,0.4);
  }

  .key-selector {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }

  .key-selector label {
    font-size: 0.88rem;
    color: var(--text-muted);
    font-weight: 600;
    white-space: nowrap;
  }

  .key-buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .key-btn {
    width: 38px;
    height: 38px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
  }

  .key-btn:hover { border-color: var(--accent3); color: var(--accent3); }
  .key-btn.active {
    background: var(--accent3);
    border-color: var(--accent3);
    color: #000;
    font-weight: 800;
  }

  #results {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 16px;
  }

  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }

  .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
  .empty-state p { font-size: 1rem; }

  .prog-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    transition: border-color 0.2s, transform 0.2s;
    position: relative;
    overflow: hidden;
  }

  .prog-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    opacity: 0;
    transition: opacity 0.2s;
  }

  .prog-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
  }

  .prog-card:hover::before { opacity: 1; }

  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 14px;
  }

  .card-title {
    font-size: 1rem;
    font-weight: 700;
    color: var(--text);
    line-height: 1.3;
  }

  .card-tags {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }

  .tag {
    font-size: 0.68rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 999px;
    letter-spacing: 0.5px;
  }

  .tag-genre { background: rgba(124,109,250,0.2); color: var(--accent); }
  .tag-mood  { background: rgba(192,132,252,0.2); color: var(--accent2); }

  .chord-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }

  .chord-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }

  .chord-name {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 14px;
    font-size: 1.05rem;
    font-weight: 800;
    color: var(--text);
    min-width: 52px;
    text-align: center;
    letter-spacing: -0.3px;
    transition: background 0.15s;
  }

  .chord-box:hover .chord-name {
    background: rgba(124,109,250,0.15);
    border-color: var(--accent);
  }

  .roman {
    font-size: 0.68rem;
    color: var(--text-muted);
    font-weight: 600;
  }

  .arrow {
    color: var(--border);
    font-size: 1rem;
    padding-bottom: 14px;
  }

  .card-desc {
    font-size: 0.82rem;
    color: var(--text-muted);
    line-height: 1.6;
    border-top: 1px solid var(--border);
    padding-top: 12px;
  }

  .card-meta {
    display: flex;
    gap: 12px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }

  .meta-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.78rem;
    color: var(--text-muted);
  }

  .meta-item span { color: var(--warning); font-weight: 600; }

  .copy-btn {
    position: absolute;
    bottom: 14px;
    right: 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-muted);
    font-size: 0.75rem;
    padding: 4px 10px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .copy-btn:hover { color: var(--accent3); border-color: var(--accent3); }
  .copy-btn.copied { color: var(--success); border-color: var(--success); }

  .filter-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 24px;
    margin-bottom: 28px;
  }

  .results-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .results-count {
    font-size: 0.85rem;
    color: var(--text-muted);
  }

  .results-count strong {
    color: var(--accent);
  }

  @media (max-width: 600px) {
    header .logo { font-size: 1.5rem; }
    #results { grid-template-columns: 1fr; }
    .chord-name { padding: 6px 10px; font-size: 0.95rem; min-width: 44px; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">🎵 코드 진행 추천기</div>

const KEYS = ['C', 'C#', 'D', 'Eb', 'E', 'F', 'F#', 'G', 'Ab', 'A', 'Bb', 'B'];

// Semitone offsets from C
const NOTE_SEMITONES = { C:0,'C#':1,Db:1,D:2,'D#':3,Eb:3,E:4,F:5,'F#':6,Gb:6,G:7,'G#':8,Ab:8,A:9,'A#':10,Bb:10,B:11 };
const SEMITONE_NAMES = ['C','C#','D','Eb','E','F','F#','G','Ab','A','Bb','B'];

function transposeChord(chord, semitones) {
  if (!chord || chord === '/') return chord;
  // Parse chord: root + optional modifier
  const match = chord.match(/^([A-G][#b]?)(.*)/);
  if (!match) return chord;
  const [, root, mod] = match;
  const base = NOTE_SEMITONES[root];
  if (base === undefined) return chord;
  const newSemi = ((base + semitones) % 12 + 12) % 12;
  return SEMITONE_NAMES[newSemi] + mod;
}

function transposeProgression(chords, fromKey, toKey) {
  const diff = (NOTE_SEMITONES[toKey] - NOTE_SEMITONES[fromKey] + 12) % 12;
  return chords.map(c => transposeChord(c, diff));
}

// ─── State ──────────────────────────────────────────────────────────────────
let selectedGenres = new Set();
let selectedMoods  = new Set();
let selectedKey    = 'C';

// ─── Init chips ─────────────────────────────────────────────────────────────
function buildChips(items, containerId, selectedSet, onToggle) {
  const el = document.getElementById(containerId);
  items.forEach(item => {
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.textContent = item;
    chip.addEventListener('click', () => {
      if (selectedSet.has(item)) {
        selectedSet.delete(item);
        chip.classList.remove('active');
      } else {
        selectedSet.add(item);
        chip.classList.add('active');
      }
      onToggle();
    });
    el.appendChild(chip);
  });
}

function buildKeyButtons() {
  const el = document.getElementById('key-buttons');
  KEYS.forEach(k => {
    const btn = document.createElement('button');
    btn.className = 'key-btn' + (k === 'C' ? ' active' : '');
    btn.textContent = k;
    btn.addEventListener('click', () => {
      document.querySelectorAll('.key-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedKey = k;
      render();
    });
    el.appendChild(btn);
  });
}

// ─── Render ──────────────────────────────────────────────────────────────────
function render() {
  const noFilter = selectedGenres.size === 0 && selectedMoods.size === 0;
  const filtered = DB.filter(p => {
    const gMatch = selectedGenres.size === 0 || p.genres.some(g => selectedGenres.has(g));
    const mMatch = selectedMoods.size  === 0 || p.moods.some(m => selectedMoods.has(m));
    return gMatch && mMatch;
  });

  const countEl = document.getElementById('results-count');
  countEl.innerHTML = filtered.length > 0
    ? `<strong>${filtered.length}</strong>개의 코드 진행을 찾았습니다`
    : '';

  const container = document.getElementById('results');
  container.innerHTML = '';

  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="icon">🎼</div>
        <p>선택한 조건에 맞는 코드 진행이 없습니다.<br>다른 장르나 분위기를 선택해보세요.</p>
      </div>`;
    return;
  }

  filtered.forEach((p, idx) => {
    const transposedChords = transposeProgression(p.chords, p.key, selectedKey);
    const card = document.createElement('div');
    card.className = 'prog-card';

    const chordItems = transposedChords.map((ch, i) => {
      const isLast = i === transposedChords.length - 1;
      return `
        <div class="chord-box">
          <div class="chord-name">${ch}</div>
          <div class="roman">${p.romans[i] || ''}</div>
        </div>
        ${!isLast ? '<div class="arrow">›</div>' : ''}
      `;
    }).join('');

    const genreTags = p.genres.map(g => `<span class="tag tag-genre">${g}</span>`).join('');
    const moodTags  = p.moods.map(m  => `<span class="tag tag-mood">${m}</span>`).join('');

    card.innerHTML = `
      <div class="card-header">
        <div class="card-title">${p.title}</div>
        <div class="card-tags">${genreTags}</div>
      </div>
      <div class="card-meta">
        <div class="meta-item">🎹 Key: <span>${selectedKey}</span></div>
        <div class="meta-item">🥁 BPM: <span>${p.bpm}</span></div>
        <div class="meta-item">📐 박자: <span>${p.feel}</span></div>
      </div>
      <div class="chord-row">${chordItems}</div>
      <div class="card-tags" style="margin-bottom:10px">${moodTags}</div>
      <div class="card-desc">${p.desc}</div>
      <button class="copy-btn" data-chords="${transposedChords.join(' – ')}">복사</button>
    `;

    card.querySelector('.copy-btn').addEventListener('click', function() {
      navigator.clipboard.writeText(this.dataset.chords).then(() => {
        this.textContent = '✓ 복사됨';
        this.classList.add('copied');
        setTimeout(() => {
          this.textContent = '복사';
          this.classList.remove('copied');
        }, 1500);
      });
    });

    container.appendChild(card);
  });
}

// ─── Boot ────────────────────────────────────────────────────────────────────
buildChips(GENRES, 'genre-chips', selectedGenres, render);
buildChips(MOODS,  'mood-chips',  selectedMoods,  render);
buildKeyButtons();
render();
</script>
