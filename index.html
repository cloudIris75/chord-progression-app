<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>코드 진행 추천기</title>
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a24;
    --surface2: #232333;
    --border: #2e2e42;
    --accent: #7c6dfa;
    --accent2: #c084fc;
    --accent3: #38bdf8;
    --text: #e2e2f0;
    --text-muted: #8888aa;
    --success: #34d399;
    --warning: #fbbf24;
    --card-shadow: 0 4px 24px rgba(0,0,0,0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    padding: 24px 16px 60px;
  }

  header {
    text-align: center;
    margin-bottom: 40px;
  }

  header .logo {
    font-size: 2rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.5px;
  }

  header .subtitle {
    color: var(--text-muted);
    margin-top: 6px;
    font-size: 0.95rem;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
  }

  .section-label {
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 12px;
  }

  .chip-group {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 28px;
  }

  .chip {
    padding: 8px 16px;
    border-radius: 999px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    font-size: 0.88rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.18s ease;
    user-select: none;
  }

  .chip:hover {
    border-color: var(--accent);
    color: var(--text);
  }

  .chip.active {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-color: transparent;
    color: #fff;
    font-weight: 700;
    box-shadow: 0 0 16px rgba(124,109,250,0.4);
  }

  .key-selector {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }

  .key-selector label {
    font-size: 0.88rem;
    color: var(--text-muted);
    font-weight: 600;
    white-space: nowrap;
  }

  .key-buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .key-btn {
    width: 38px;
    height: 38px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
  }

  .key-btn:hover { border-color: var(--accent3); color: var(--accent3); }
  .key-btn.active {
    background: var(--accent3);
    border-color: var(--accent3);
    color: #000;
    font-weight: 800;
  }

  #results {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 16px;
  }

  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }

  .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
  .empty-state p { font-size: 1rem; }

  .prog-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    transition: border-color 0.2s, transform 0.2s;
    position: relative;
    overflow: hidden;
  }

  .prog-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    opacity: 0;
    transition: opacity 0.2s;
  }

  .prog-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
  }

  .prog-card:hover::before { opacity: 1; }

  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 14px;
  }

  .card-title {
    font-size: 1rem;
    font-weight: 700;
    color: var(--text);
    line-height: 1.3;
  }

  .card-tags {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }

  .tag {
    font-size: 0.68rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 999px;
    letter-spacing: 0.5px;
  }

  .tag-genre { background: rgba(124,109,250,0.2); color: var(--accent); }
  .tag-mood  { background: rgba(192,132,252,0.2); color: var(--accent2); }

  .chord-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }

  .chord-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }

  .chord-name {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 14px;
    font-size: 1.05rem;
    font-weight: 800;
    color: var(--text);
    min-width: 52px;
    text-align: center;
    letter-spacing: -0.3px;
    transition: background 0.15s;
  }

  .chord-box:hover .chord-name {
    background: rgba(124,109,250,0.15);
    border-color: var(--accent);
  }

  .roman {
    font-size: 0.68rem;
    color: var(--text-muted);
    font-weight: 600;
  }

  .arrow {
    color: var(--border);
    font-size: 1rem;
    padding-bottom: 14px;
  }

  .card-desc {
    font-size: 0.82rem;
    color: var(--text-muted);
    line-height: 1.6;
    border-top: 1px solid var(--border);
    padding-top: 12px;
  }

  .card-meta {
    display: flex;
    gap: 12px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }

  .meta-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.78rem;
    color: var(--text-muted);
  }

  .meta-item span { color: var(--warning); font-weight: 600; }

  .card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 12px;
    border-top: 1px solid var(--border);
    padding-top: 10px;
    gap: 8px;
  }
  .note-btn {
    background: rgba(56,189,248,0.08);
    border: 1px solid rgba(56,189,248,0.25);
    border-radius: 8px;
    color: var(--accent3);
    font-size: 0.76rem;
    font-weight: 700;
    padding: 5px 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .note-btn:hover { background: rgba(56,189,248,0.18); border-color: var(--accent3); }
  .copy-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-muted);
    font-size: 0.75rem;
    padding: 5px 12px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .copy-btn:hover { color: var(--accent3); border-color: var(--accent3); }
  .copy-btn.copied { color: var(--success); border-color: var(--success); }

  .filter-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 24px;
    margin-bottom: 28px;
  }

  .results-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .results-count {
    font-size: 0.85rem;
    color: var(--text-muted);
  }

  .results-count strong {
    color: var(--accent);
  }

  /* ── Analyzer ── */
  .analyzer-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 20px 24px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }
  .analyzer-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--accent3), var(--success));
  }
  .analyzer-input-row {
    display: flex;
    gap: 10px;
    margin-bottom: 0;
  }
  .analyzer-input {
    flex: 1;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 1rem;
    padding: 10px 16px;
    outline: none;
    transition: border-color 0.2s;
    font-family: inherit;
  }
  .analyzer-input::placeholder { color: var(--text-muted); }
  .analyzer-input:focus { border-color: var(--accent3); }
  .analyze-btn {
    background: linear-gradient(135deg, var(--accent3), var(--success));
    border: none;
    border-radius: 10px;
    color: #000;
    font-size: 0.9rem;
    font-weight: 800;
    padding: 10px 22px;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.15s;
    white-space: nowrap;
  }
  .analyze-btn:hover { opacity: 0.85; transform: translateY(-1px); }
  .analyze-btn:active { transform: translateY(0); }

  .analysis-result {
    margin-top: 20px;
    border-top: 1px solid var(--border);
    padding-top: 18px;
  }
  .analysis-key-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(56,189,248,0.12);
    border: 1px solid rgba(56,189,248,0.3);
    border-radius: 10px;
    padding: 6px 14px;
    margin-bottom: 16px;
    font-size: 0.88rem;
    color: var(--accent3);
    font-weight: 700;
  }
  .analysis-key-badge .confidence {
    font-size: 0.75rem;
    font-weight: 500;
    opacity: 0.8;
  }
  .analysis-roman-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 18px;
    align-items: flex-end;
  }
  .analysis-chord-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .analysis-chord-original {
    font-size: 1rem;
    font-weight: 800;
    color: var(--text);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 7px 13px;
    min-width: 50px;
    text-align: center;
  }
  .analysis-chord-original.non-diatonic {
    border-color: var(--warning);
    color: var(--warning);
  }
  .analysis-roman-label {
    font-size: 0.7rem;
    color: var(--text-muted);
    font-weight: 700;
    text-align: center;
  }
  .analysis-arrow {
    color: var(--border);
    font-size: 1rem;
    padding-bottom: 20px;
  }
  .features-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 7px;
    margin-bottom: 14px;
  }
  .features-list li {
    font-size: 0.85rem;
    color: var(--text);
    display: flex;
    gap: 8px;
    align-items: flex-start;
    line-height: 1.5;
  }
  .features-list li .icon { flex-shrink: 0; }
  .analysis-tags-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 10px;
  }
  .analysis-section-title {
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
  }
  .similar-match {
    background: rgba(124,109,250,0.1);
    border: 1px solid rgba(124,109,250,0.3);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 0.82rem;
    color: var(--accent);
    cursor: pointer;
    transition: background 0.15s;
  }
  .similar-match:hover { background: rgba(124,109,250,0.2); }
  .analysis-hint {
    font-size: 0.78rem;
    color: var(--text-muted);
    margin-top: 10px;
    font-style: italic;
  }

  /* ── Note Modal ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.74);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 16px;
    backdrop-filter: blur(3px);
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    max-width: 680px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    padding: 24px 24px 28px;
  }
  .modal-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 16px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }
  .modal-title { font-size: 1rem; font-weight: 800; line-height: 1.4; }
  .modal-subtitle { font-size: 0.78rem; color: var(--text-muted); margin-top: 4px; }
  .modal-close {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-muted);
    font-size: 1.1rem;
    width: 34px; height: 34px;
    flex-shrink: 0;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .modal-close:hover { color: var(--text); border-color: var(--text); }
  .modal-legend {
    display: flex; gap: 14px; flex-wrap: wrap;
    margin-bottom: 18px;
    padding: 9px 13px;
    background: var(--surface2);
    border-radius: 10px;
    font-size: 0.75rem;
    color: var(--text-muted);
  }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .legend-dot.root  { background: var(--accent); }
  .legend-dot.chord { background: var(--success); }
  .legend-dot.scale { background: #60a5fa; }
  /* Per-chord section */
  .cns {
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 12px;
    background: rgba(255,255,255,0.015);
  }
  .cns-header {
    display: flex; align-items: center; gap: 10px;
    flex-wrap: wrap; margin-bottom: 12px;
  }
  .cns-name { font-size: 1.45rem; font-weight: 900; }
  .cns-roman {
    font-size: 0.78rem; font-weight: 700;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px; padding: 2px 8px;
    color: var(--text-muted);
  }
  .cns-type {
    font-size: 0.69rem; font-weight: 700;
    background: rgba(124,109,250,0.15);
    color: var(--accent);
    border-radius: 999px; padding: 2px 10px;
  }
  /* Chord tone chips */
  .tone-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 4px; }
  .tone-chip {
    display: flex; flex-direction: column; align-items: center;
    padding: 5px 10px; border-radius: 9px;
    font-size: 0.92rem; font-weight: 900; min-width: 44px; text-align: center;
  }
  .tone-chip small { font-size: 0.57rem; font-weight: 500; margin-top: 1px; opacity: 0.8; }
  .tone-chip.t-root  { background: var(--accent); color: #fff; }
  .tone-chip.t-chord { background: rgba(52,211,153,0.18); color: var(--success); border: 1px solid var(--success); }
  /* Piano keyboard */
  .piano-wrap {
    position: relative; height: 78px;
    margin: 14px 0 8px; user-select: none;
  }
  .piano-whites { display: flex; height: 100%; }
  .piano-w {
    flex: 1; height: 100%;
    border: 1px solid #3a3a50; border-right: none;
    border-radius: 0 0 5px 5px;
    background: #b8b8cc;
    display: flex; align-items: flex-end; justify-content: center;
    padding-bottom: 4px; position: relative; z-index: 1;
    transition: background 0.1s;
  }
  .piano-w:last-child { border-right: 1px solid #3a3a50; }
  .kl  { font-size: 0.57rem; font-weight: 800; color: #444; pointer-events: none; }
  .piano-b {
    position: absolute; top: 0; height: 54%;
    background: #1a1a2e;
    border-radius: 0 0 4px 4px; border: 1px solid #000;
    z-index: 2;
    display: flex; align-items: flex-end; justify-content: center;
    padding-bottom: 2px; transition: background 0.1s;
  }
  .klb { font-size: 0.48rem; font-weight: 800; color: #666; pointer-events: none; }
  .piano-w.is-root  { background: var(--accent); }
  .piano-w.is-chord { background: var(--success); }
  .piano-w.is-scale { background: #60a5fa; }
  .piano-b.is-root  { background: #9f8ef0; }
  .piano-b.is-chord { background: #059669; }
  .piano-b.is-scale { background: #2563eb; }
  .piano-w.is-root .kl, .piano-w.is-chord .kl, .piano-w.is-scale .kl { color: #fff; font-weight: 900; }
  .piano-b.is-root .klb, .piano-b.is-chord .klb, .piano-b.is-scale .klb { color: #fff; }
  /* Scale recommendations */
  .scale-rec { background: var(--surface2); border-radius: 10px; padding: 12px 14px; margin-top: 10px; }
  .scale-rec-head { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; flex-wrap: wrap; }
  .scale-rec-name { font-size: 0.88rem; font-weight: 800; }
  .scale-rec-badge {
    font-size: 0.64rem; font-weight: 700;
    background: rgba(56,189,248,0.15); color: var(--accent3);
    border-radius: 999px; padding: 1px 7px;
  }
  .scale-rec-desc { font-size: 0.78rem; color: var(--text-muted); line-height: 1.55; margin-bottom: 8px; }
  .scale-notes-row { display: flex; flex-wrap: wrap; gap: 4px; }
  .sn {
    padding: 3px 9px; border-radius: 6px;
    font-size: 0.8rem; font-weight: 700;
    background: var(--surface); border: 1px solid var(--border); color: var(--text-muted);
  }
  .sn.sn-root  { background: rgba(124,109,250,0.15); border-color: var(--accent);  color: var(--accent);  }
  .sn.sn-chord { background: rgba(52,211,153,0.12);  border-color: var(--success); color: var(--success); }

  @media (max-width: 600px) {
    header .logo { font-size: 1.5rem; }
    #results { grid-template-columns: 1fr; }
    .chord-name { padding: 6px 10px; font-size: 0.95rem; min-width: 44px; }
    .analyzer-input-row { flex-direction: column; }
    .analyze-btn { width: 100%; }
    .modal-box { padding: 16px; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">🎵 코드 진행 추천기</div>
    <p class="subtitle">장르와 분위기를 선택하면 어울리는 코드 진행을 추천해드립니다</p>
  </header>

  <div class="analyzer-card">
    <div class="section-label" style="margin-bottom:12px">🔍 코드 진행 분석기</div>
    <div class="analyzer-input-row">
      <input type="text" id="analyzer-input" class="analyzer-input"
             placeholder="예: Am F C G  또는  Cmaj7 Am7 Dm7 G7  또는  Em C G D" />
      <button id="analyze-btn" class="analyze-btn">분석하기</button>
    </div>
    <div id="analysis-result" class="analysis-result" style="display:none"></div>
  </div>

  <div class="filter-bar">
    <div class="section-label">장르 선택</div>
    <div class="chip-group" id="genre-chips"></div>

    <div class="section-label">분위기 선택</div>
    <div class="chip-group" id="mood-chips"></div>

    <div class="key-selector">
      <label>🎹 조성 (Key)</label>
      <div class="key-buttons" id="key-buttons"></div>
    </div>
  </div>

  <div class="results-header">
    <div class="results-count" id="results-count"></div>
  </div>

  <div id="results"></div>
</div>

<!-- Note Analysis Modal -->
<div class="modal-overlay" id="note-modal">
  <div class="modal-box" id="note-modal-box">
    <!-- filled by JS -->
  </div>
</div>

<script>
const GENRES = ['팝', '재즈', '록', 'R&B / 소울', '블루스', '클래식', 'EDM', '포크 / 어쿠스틱', '보사노바', '메탈'];
const MOODS  = ['밝고 경쾌한', '슬프고 감성적인', '낭만적인', '긴장감 / 어두운', '웅장하고 장엄한', '편안하고 차분한', '에너제틱', '신비로운'];

const KEYS = ['C', 'C#', 'D', 'Eb', 'E', 'F', 'F#', 'G', 'Ab', 'A', 'Bb', 'B'];

// Semitone offsets from C
const NOTE_SEMITONES = { C:0,'C#':1,Db:1,D:2,'D#':3,Eb:3,E:4,F:5,'F#':6,Gb:6,G:7,'G#':8,Ab:8,A:9,'A#':10,Bb:10,B:11 };
const SEMITONE_NAMES = ['C','C#','D','Eb','E','F','F#','G','Ab','A','Bb','B'];

function transposeChord(chord, semitones) {
  if (!chord || chord === '/') return chord;
  // Parse chord: root + optional modifier
  const match = chord.match(/^([A-G][#b]?)(.*)/);
  if (!match) return chord;
  const [, root, mod] = match;
  const base = NOTE_SEMITONES[root];
  if (base === undefined) return chord;
  const newSemi = ((base + semitones) % 12 + 12) % 12;
  return SEMITONE_NAMES[newSemi] + mod;
}

function transposeProgression(chords, fromKey, toKey) {
  const fromNote = fromKey.replace(/m$/, '');
  const diff = (NOTE_SEMITONES[toKey] - NOTE_SEMITONES[fromNote] + 12) % 12;
  return chords.map(c => transposeChord(c, diff));
}

// ─── State ──────────────────────────────────────────────────────────────────
let selectedGenres = new Set();
let selectedMoods  = new Set();
let selectedKey    = 'C';

// ─── Chord Analyzer ──────────────────────────────────────────────────────────

const MAJOR_DIATONIC = [
  {semi:0,  roman:'I',    q:'major'},
  {semi:2,  roman:'ii',   q:'minor'},
  {semi:4,  roman:'iii',  q:'minor'},
  {semi:5,  roman:'IV',   q:'major'},
  {semi:7,  roman:'V',    q:'major'},
  {semi:9,  roman:'vi',   q:'minor'},
  {semi:11, roman:'vii°', q:'dim'},
];
const MINOR_DIATONIC = [
  {semi:0,  roman:'i',   q:'minor'},
  {semi:2,  roman:'ii°', q:'dim'},
  {semi:3,  roman:'III', q:'major'},
  {semi:5,  roman:'iv',  q:'minor'},
  {semi:7,  roman:'v',   q:'minor'},
  {semi:8,  roman:'VI',  q:'major'},
  {semi:10, roman:'VII', q:'major'},
];
// Chromatic degree names relative to a key root
const CHR_MAJOR = ['I','♭II','II','♭III','III','IV','♭V','V','♭VI','VI','♭VII','VII'];
const CHR_MINOR = ['i','♭II','ii','III','♯III','iv','♭v','v','VI','♯vi','VII','♯vii'];

function parseChordObj(str) {
  const m = str.match(/^([A-G][#b]?)(.*)/);
  if (!m) return null;
  const root = m[1][0].toUpperCase() + m[1].slice(1);
  const rest = m[2];
  const restL = rest.toLowerCase();
  let quality = 'major';
  if (/^(m(?!aj)|min\b)/.test(restL)) quality = 'minor';
  else if (/dim/.test(restL))         quality = 'dim';
  else if (/aug|\+/.test(restL))      quality = 'aug';
  const hasMaj7 = /maj7/i.test(rest);
  const has7    = !hasMaj7 && /7/.test(rest);
  const hasSus  = /sus/i.test(rest);
  return { root, quality, hasMaj7, has7, hasSus, original: str };
}

function parseInput(input) {
  return input.trim()
    .split(/[\s,\-–→|]+/)
    .map(s => s.trim())
    .filter(s => s && /^[A-Ga-g]/.test(s))
    .map(parseChordObj)
    .filter(Boolean);
}

function scoreKey(chords, keySemi, diatonic, isMinor) {
  let score = 0;
  for (const c of chords) {
    const cs = NOTE_SEMITONES[c.root];
    if (cs === undefined) continue;
    const diff = ((cs - keySemi) + 12) % 12;
    const entry = diatonic.find(d => d.semi === diff);
    if (entry) {
      score += c.quality === entry.q ? 2 : 1;
    }
    // Harmonic minor: V (major) on degree 7 in minor key
    if (isMinor && diff === 7 && c.quality === 'major') score += 1;
  }
  return score;
}

function detectKey(chords) {
  let best = { key: 'C', isMinor: false, score: -1 };
  for (let s = 0; s < 12; s++) {
    const mj = scoreKey(chords, s, MAJOR_DIATONIC, false);
    if (mj > best.score) best = { key: SEMITONE_NAMES[s], isMinor: false, score: mj };
    const mn = scoreKey(chords, s, MINOR_DIATONIC, true);
    if (mn > best.score) best = { key: SEMITONE_NAMES[s], isMinor: true, score: mn };
  }
  const confidence = Math.min(100, Math.round((best.score / (chords.length * 2)) * 100));
  return { ...best, confidence };
}

function getRoman(chord, keySemi, isMinor) {
  const cs = NOTE_SEMITONES[chord.root];
  if (cs === undefined) return '?';
  const diff = ((cs - keySemi) + 12) % 12;
  const diatonic = isMinor ? MINOR_DIATONIC : MAJOR_DIATONIC;
  const entry = diatonic.find(d => d.semi === diff);

  let roman, nonDiatonic = false;
  if (entry) {
    if      (chord.quality === 'major') roman = entry.roman.replace('°','').toUpperCase();
    else if (chord.quality === 'minor') roman = entry.roman.replace('°','').toLowerCase();
    else if (chord.quality === 'dim')   roman = entry.roman.toLowerCase().replace(/°?$/, '°');
    else if (chord.quality === 'aug')   roman = entry.roman.toUpperCase() + '+';
    else                                roman = entry.roman;
  } else {
    nonDiatonic = true;
    let base = isMinor ? CHR_MINOR[diff] : CHR_MAJOR[diff];
    if      (chord.quality === 'major') roman = base.toUpperCase();
    else if (chord.quality === 'minor') roman = base.toLowerCase();
    else if (chord.quality === 'dim')   roman = base.toLowerCase() + '°';
    else                                roman = base;
  }

  if (chord.hasMaj7) roman += 'maj7';
  else if (chord.has7) roman += '7';
  if (chord.hasSus)   roman += 'sus';
  return { roman, nonDiatonic };
}

function analyzeFeatures(chords, romanInfos, key, isMinor) {
  const features = [];
  const nonDiatonicCount = romanInfos.filter(r => r.nonDiatonic).length;
  const total = chords.length;
  const hasSeventh = chords.some(c => c.has7 || c.hasMaj7);
  const hasMaj7    = chords.some(c => c.hasMaj7);
  const hasDim     = chords.some(c => c.quality === 'dim');
  const hasAug     = chords.some(c => c.quality === 'aug');
  const hasSus     = chords.some(c => c.hasSus);

  // Key feel
  if (isMinor) {
    features.push({ icon: '🎭', text: `단조(${key}m) 기반 — 감성적이고 내성적인 분위기` });
  } else {
    features.push({ icon: '☀️', text: `장조(${key}) 기반 — 밝고 안정적인 분위기` });
  }

  // Diatonic status
  if (nonDiatonicCount === 0) {
    features.push({ icon: '✅', text: '모든 코드가 조성 내 화음 — 안정적이고 자연스러운 흐름' });
  } else {
    const borrowed = romanInfos.filter(r => r.nonDiatonic).map((r, i) => chords[romanInfos.indexOf(r)]?.original).join(', ');
    features.push({ icon: '🎨', text: `조성 밖 화음 ${nonDiatonicCount}개 포함 (${borrowed}) — 색채적인 변화` });
  }

  // 7th chords
  if (hasMaj7) {
    features.push({ icon: '🎷', text: 'maj7 화음 사용 — 재즈/보사노바 특유의 부드럽고 세련된 색채' });
  } else if (hasSeventh) {
    features.push({ icon: '🎺', text: '도미넌트 7화음 포함 — 텐션과 해결감이 강조됨' });
  }

  // Dim / Aug / Sus
  if (hasDim) features.push({ icon: '😰', text: '감화음(dim) 포함 — 불안정하고 긴장감 있는 순간 연출' });
  if (hasAug) features.push({ icon: '✨', text: '증화음(aug) 포함 — 몽환적이고 불안한 색채' });
  if (hasSus) features.push({ icon: '🌊', text: 'sus 화음 포함 — 해결 전 부유하는 느낌' });

  // Cadence check (last chord)
  const lastRoman = romanInfos[romanInfos.length - 1]?.roman ?? '';
  const lastBase  = lastRoman.replace(/maj7|sus|\d|°|\+/g, '').replace(/[*♭♯]/g, '').toLowerCase();
  if (lastBase === 'i' || lastBase === 'i') {
    features.push({ icon: '🔒', text: '마지막 화음이 으뜸화음(I/i) — 완전 종지, 안정적 마무리' });
  } else if (lastBase === 'v') {
    features.push({ icon: '⏭️', text: '마지막 화음이 딸림화음(V) — 미완결 종지, 다음으로 이어지는 느낌' });
  } else if (lastBase === 'iv' || lastBase === 'iv') {
    features.push({ icon: '🌅', text: '마지막 화음이 IV — 플라갈 종지, 차분하게 열린 느낌' });
  }

  // Progression movement
  const semis = chords.map(c => NOTE_SEMITONES[c.root]).filter(v => v !== undefined);
  const diffs = semis.slice(1).map((s, i) => ((s - semis[i] + 12) % 12));
  const hasFifthDown = diffs.some(d => d === 5); // down a 5th = up a 4th
  const hasFourthUp  = diffs.some(d => d === 7); // up a 5th
  if (hasFifthDown) {
    features.push({ icon: '🔄', text: '5도 하강(4도 상승) 움직임 포함 — 재즈에서 자주 쓰이는 강한 해결감' });
  }

  // Suggest moods & genres based on characteristics
  const moodSuggestions = [];
  const genreSuggestions = [];

  if (isMinor) {
    moodSuggestions.push('슬프고 감성적인', '신비로운');
    genreSuggestions.push('R&B / 소울', '록');
  } else {
    moodSuggestions.push('밝고 경쾌한', '낭만적인');
    genreSuggestions.push('팝', '포크 / 어쿠스틱');
  }
  if (hasMaj7) { genreSuggestions.push('재즈', '보사노바'); moodSuggestions.push('편안하고 차분한'); }
  else if (hasSeventh && !isMinor) { genreSuggestions.push('블루스'); moodSuggestions.push('에너제틱'); }
  if (nonDiatonicCount > 0 && isMinor) moodSuggestions.push('긴장감 / 어두운');

  return {
    features,
    moods:  [...new Set(moodSuggestions)].slice(0, 3),
    genres: [...new Set(genreSuggestions)].slice(0, 4),
  };
}

function findSimilarInDB(romanInfos, isMinor) {
  const inputRomans = romanInfos.map(r => r.roman.replace(/maj7|sus|\d|°|\+|\*/g,'').toLowerCase());
  return DB.filter(entry => {
    if (entry.romans.length !== inputRomans.length) return false;
    const entryRomans = entry.romans.map(r => r.replace(/[⁷maj]/g,'').toLowerCase().replace('°',''));
    return entryRomans.every((r, i) => r === inputRomans[i]);
  });
}

function renderAnalysis(input) {
  const chords = parseInput(input);
  const resultEl = document.getElementById('analysis-result');

  if (chords.length < 2) {
    resultEl.style.display = 'block';
    resultEl.innerHTML = `<p style="color:var(--text-muted);font-size:0.88rem">⚠️ 코드를 2개 이상 입력해주세요. (예: Am F C G)</p>`;
    return;
  }

  const { key, isMinor, confidence } = detectKey(chords);
  const keySemi = NOTE_SEMITONES[key];
  const romanInfos = chords.map(c => getRoman(c, keySemi, isMinor));
  const { features, moods, genres } = analyzeFeatures(chords, romanInfos, key, isMinor);
  const similar = findSimilarInDB(romanInfos, isMinor);

  // Build roman row HTML
  const romanRowHTML = chords.map((c, i) => {
    const { roman, nonDiatonic } = romanInfos[i];
    const isLast = i === chords.length - 1;
    return `
      <div class="analysis-chord-box">
        <div class="analysis-chord-original ${nonDiatonic ? 'non-diatonic' : ''}">${c.original}</div>
        <div class="analysis-roman-label">${roman}</div>
      </div>
      ${!isLast ? '<div class="analysis-arrow">›</div>' : ''}
    `;
  }).join('');

  const featuresHTML = features.map(f =>
    `<li><span class="icon">${f.icon}</span><span>${f.text}</span></li>`
  ).join('');

  const moodTagsHTML = moods.map(m =>
    `<span class="tag tag-mood">${m}</span>`
  ).join('');

  const genreTagsHTML = genres.map(g =>
    `<span class="tag tag-genre">${g}</span>`
  ).join('');

  const similarHTML = similar.length > 0
    ? `<div style="margin-top:14px">
        <div class="analysis-section-title">📚 데이터베이스 매칭</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px">
          ${similar.map(p => `<div class="similar-match">✓ "${p.title}"와 동일한 진행</div>`).join('')}
        </div>
      </div>`
    : '';

  const nonDiatonicNote = romanInfos.some(r => r.nonDiatonic)
    ? `<p class="analysis-hint">* 표시는 감지된 조성(${key}${isMinor ? 'm' : ''}) 밖의 화음입니다.</p>`
    : '';

  resultEl.style.display = 'block';
  resultEl.innerHTML = `
    <div class="analysis-key-badge">
      🎹 감지된 조성: <strong>${key}${isMinor ? ' 단조' : ' 장조'}</strong>
      <span class="confidence">(신뢰도 ${confidence}%)</span>
    </div>
    <div class="analysis-section-title">로마 숫자 분석</div>
    <div class="analysis-roman-row">${romanRowHTML}</div>
    <div class="analysis-section-title">주요 특징</div>
    <ul class="features-list">${featuresHTML}</ul>
    <div class="analysis-section-title" style="margin-top:12px">분위기</div>
    <div class="analysis-tags-row" style="margin-bottom:10px">${moodTagsHTML}</div>
    <div class="analysis-section-title">어울리는 장르</div>
    <div class="analysis-tags-row">${genreTagsHTML}</div>
    ${similarHTML}
    ${nonDiatonicNote}
  `;
}

// ─── Init chips ─────────────────────────────────────────────────────────────
function buildChips(items, containerId, selectedSet, onToggle) {
  const el = document.getElementById(containerId);
  items.forEach(item => {
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.textContent = item;
    chip.addEventListener('click', () => {
      if (selectedSet.has(item)) {
        selectedSet.delete(item);
        chip.classList.remove('active');
      } else {
        selectedSet.add(item);
        chip.classList.add('active');
      }
      onToggle();
    });
    el.appendChild(chip);
  });
}

function buildKeyButtons() {
  const el = document.getElementById('key-buttons');
  KEYS.forEach(k => {
    const btn = document.createElement('button');
    btn.className = 'key-btn' + (k === 'C' ? ' active' : '');
    btn.textContent = k;
    btn.addEventListener('click', () => {
      document.querySelectorAll('.key-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedKey = k;
      render();
    });
    el.appendChild(btn);
  });
}

// ─── Render ──────────────────────────────────────────────────────────────────
function render() {
  const noFilter = selectedGenres.size === 0 && selectedMoods.size === 0;
  const filtered = DB.filter(p => {
    const gMatch = selectedGenres.size === 0 || p.genres.some(g => selectedGenres.has(g));
    const mMatch = selectedMoods.size  === 0 || p.moods.some(m => selectedMoods.has(m));
    return gMatch && mMatch;
  });

  const countEl = document.getElementById('results-count');
  countEl.innerHTML = filtered.length > 0
    ? `<strong>${filtered.length}</strong>개의 코드 진행을 찾았습니다`
    : '';

  const container = document.getElementById('results');
  container.innerHTML = '';

  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="icon">🎼</div>
        <p>선택한 조건에 맞는 코드 진행이 없습니다.<br>다른 장르나 분위기를 선택해보세요.</p>
      </div>`;
    return;
  }

  filtered.forEach((p, idx) => {
    const transposedChords = transposeProgression(p.chords, p.key, selectedKey);
    const card = document.createElement('div');
    card.className = 'prog-card';

    const chordItems = transposedChords.map((ch, i) => {
      const isLast = i === transposedChords.length - 1;
      return `
        <div class="chord-box">
          <div class="chord-name">${ch}</div>
          <div class="roman">${p.romans[i] || ''}</div>
        </div>
        ${!isLast ? '<div class="arrow">›</div>' : ''}
      `;
    }).join('');

    const genreTags = p.genres.map(g => `<span class="tag tag-genre">${g}</span>`).join('');
    const moodTags  = p.moods.map(m  => `<span class="tag tag-mood">${m}</span>`).join('');

    card.innerHTML = `
      <div class="card-header">
        <div class="card-title">${p.title}</div>
        <div class="card-tags">${genreTags}</div>
      </div>
      <div class="card-meta">
        <div class="meta-item">🎹 Key: <span>${selectedKey}</span></div>
        <div class="meta-item">🥁 BPM: <span>${p.bpm}</span></div>
        <div class="meta-item">📐 박자: <span>${p.feel}</span></div>
      </div>
      <div class="chord-row">${chordItems}</div>
      <div class="card-tags" style="margin-bottom:10px">${moodTags}</div>
      <div class="card-desc">${p.desc}</div>
      <div class="card-footer">
        <button class="note-btn">🎹 코드별 사용 음</button>
        <button class="copy-btn" data-chords="${transposedChords.join(' – ')}">복사</button>
      </div>
    `;

    card.querySelector('.copy-btn').addEventListener('click', function() {
      navigator.clipboard.writeText(this.dataset.chords).then(() => {
        this.textContent = '✓ 복사됨';
        this.classList.add('copied');
        setTimeout(() => {
          this.textContent = '복사';
          this.classList.remove('copied');
        }, 1500);
      });
    });

    card.querySelector('.note-btn').addEventListener('click', () => openNoteModal(p));

    container.appendChild(card);
  });
}

    { name:'Lydian Dominant',   tag:'재즈',      ivls:[0,2,4,6,7,9,10], desc:'♯4+♭7. 재즈 솔로에서 세련된 색채.' },
    { name:'Altered Scale',     tag:'어드밴스드', ivls:[0,1,3,4,6,8,10], desc:'모든 텐션 변형됨. 어드밴스드 재즈 솔로잉.' },
  ],
  maj7: [
    { name:'Ionian (장음계)',    tag:'기본 추천', ivls:[0,2,4,5,7,9,11], desc:'밝고 안정적인 메이저 7th 기본 스케일.' },
    { name:'Lydian',            tag:'재즈 추천', ivls:[0,2,4,6,7,9,11], desc:'♯4로 더욱 빛나는 재즈·팝 색채.' },
  ],
  min7: [
    { name:'Dorian',            tag:'기본 추천', ivls:[0,2,3,5,7,9,10], desc:'마이너 7th에 가장 많이 추천되는 스케일.' },
    { name:'Aeolian (자연단음계)',tag:'기본',     ivls:[0,2,3,5,7,8,10], desc:'더 어둡고 감성적인 마이너 색채.' },
    { name:'Phrygian',          tag:'어두운',    ivls:[0,1,3,5,7,8,10], desc:'♭2가 특징. 이국적이고 어두운 느낌.' },
  ],
  dim: [
    { name:'Diminished Scale (반-온)', tag:'추천', ivls:[0,1,3,4,6,7,9,10],  desc:'반음-온음 반복. 긴장감 극대화.' },
    { name:'Whole-Tone Scale',         tag:'대안', ivls:[0,2,4,6,8,10],       desc:'온음만으로 구성. 몽환적·부유하는 느낌.' },
  ],
  dim7: [
    { name:'Diminished Scale (온-반)', tag:'추천', ivls:[0,2,3,5,6,8,9,11],  desc:'온음-반음 패턴. 재즈 dim7에 사용.' },
  ],
  aug: [
    { name:'Whole-Tone Scale',    tag:'기본 추천', ivls:[0,2,4,6,8,10],    desc:'온음만으로 구성. 몽환적·부유하는 느낌.' },
    { name:'Lydian Augmented',    tag:'재즈',      ivls:[0,2,4,6,8,9,11],  desc:'♯4+♯5. 재즈 aug 화음에 사용.' },
  ],
  minMaj7: [
    { name:'Harmonic Minor (화성단음계)', tag:'기본 추천', ivls:[0,2,3,5,7,8,11],  desc:'7도가 반음 올라간 단음계. 극적이고 클래식한 느낌.' },
    { name:'Melodic Minor (선율단음계)',  tag:'재즈',      ivls:[0,2,3,5,7,9,11],  desc:'상행 선율단음계 = 재즈 마이너. 현대 재즈의 핵심.' },
  ],
};

function getChordType(chord) {
  const { quality, has7, hasMaj7 } = chord;
  if (quality === 'dim') return has7 ? 'dim7' : 'dim';
  if (quality === 'aug') return 'aug';
  if (quality === 'minor') return hasMaj7 ? 'minMaj7' : has7 ? 'min7' : 'minor';
  if (hasMaj7) return 'maj7';
  if (has7)    return 'dom7';
  return 'major';
}

function renderPiano(rootSemi, chordSemis, scaleSemis) {
  const chordSet = new Set(chordSemis);
  const scaleSet = new Set(scaleSemis);
  const WHITE_SEMIS = [0,2,4,5,7,9,11];
  const NOTE_LABELS = ['C','C#','D','Eb','E','F','F#','G','Ab','A','Bb','B'];
  const BLACK_KEYS  = [{s:1,l:10.0},{s:3,l:24.3},{s:6,l:52.8},{s:8,l:67.1},{s:10,l:81.4}];

  function cls(semi) {
    if (semi === rootSemi) return 'is-root';
    if (chordSet.has(semi)) return 'is-chord';
    if (scaleSet.has(semi)) return 'is-scale';
    return '';
  }
  function lbl(semi) {
    const c = cls(semi);
    return c ? NOTE_LABELS[semi] : '';
  }

  const whites = WHITE_SEMIS.map(s =>
    `<div class="piano-w ${cls(s)}"><span class="kl">${lbl(s)}</span></div>`
  ).join('');

  const blacks = BLACK_KEYS.map(({s, l}) =>
    `<div class="piano-b ${cls(s)}" style="left:${l}%;width:8.4%"><span class="klb">${lbl(s)}</span></div>`
  ).join('');

  return `<div class="piano-wrap"><div class="piano-whites">${whites}</div>${blacks}</div>`;
}

function buildNoteModalContent(prog) {
  const transposed = transposeProgression(prog.chords, prog.key, selectedKey);
  const keyLabel   = `${selectedKey} ${prog.chords.some((c,i) => {
    // rough check: if first chord is minor
    const p = parseChordObj(transposed[0]);
    return p && p.quality === 'minor';
  }) ? '' : ''}`;

  let html = `
    <div class="modal-head">
      <div>
        <div class="modal-title">🎹 코드별 사용 가능한 음</div>
        <div class="modal-subtitle">${prog.title} &nbsp;·&nbsp; Key: ${selectedKey}</div>
      </div>
      <button class="modal-close" id="modal-close-btn">✕</button>
    </div>
    <div class="modal-legend">
      <div class="legend-item"><div class="legend-dot root"></div> 근음 (Root)</div>
      <div class="legend-item"><div class="legend-dot chord"></div> 코드 구성음</div>
      <div class="legend-item"><div class="legend-dot scale"></div> 추천 스케일 음</div>
    </div>
  `;

  transposed.forEach((chordStr, i) => {
    const chord    = parseChordObj(chordStr);
    if (!chord) return;
    const rootSemi = NOTE_SEMITONES[chord.root] ?? 0;
    const ctype    = getChordType(chord);
    const tivls    = CHORD_TONE_IVLS[ctype] ?? [0,4,7];
    const chordSemis = tivls.map(iv => (rootSemi + iv) % 12);
    const scales   = SCALE_RECS_DB[ctype] ?? SCALE_RECS_DB.major;
    const roman    = prog.romans[i] ?? '';

    // Chord tone chips
    const toneChips = tivls.map((iv, ti) => {
      const noteSemi = (rootSemi + iv) % 12;
      const noteName = SEMITONE_NAMES[noteSemi];
      const cls      = ti === 0 ? 't-root' : 't-chord';
      return `<div class="tone-chip ${cls}">${noteName}<small>${DEGREE_KR[iv]}</small></div>`;
    }).join('');

    // Primary scale piano + scale cards
    const primaryScale = scales[0];
    const primarySemis = primaryScale.ivls.map(iv => (rootSemi + iv) % 12);

    const piano = renderPiano(rootSemi, chordSemis, primarySemis);

    const scaleCards = scales.map((sc, si) => {
      const scaleSemis = sc.ivls.map(iv => (rootSemi + iv) % 12);
      const noteChips  = sc.ivls.map(iv => {
        const sem  = (rootSemi + iv) % 12;
        const name = SEMITONE_NAMES[sem];
        const cls  = iv === 0 ? 'sn-root' : chordSemis.includes(sem) ? 'sn-chord' : '';
        return `<span class="sn ${cls}">${name}</span>`;
      }).join('');
      return `
        <div class="scale-rec">
          <div class="scale-rec-head">
            <div class="scale-rec-name">${sc.name}</div>
            <div class="scale-rec-badge">${sc.tag}</div>
          </div>
          <div class="scale-rec-desc">${sc.desc}</div>
          <div class="scale-notes-row">${noteChips}</div>
        </div>`;
    }).join('');

    html += `
      <div class="cns">
        <div class="cns-header">
          <div class="cns-name">${chordStr}</div>
          <div class="cns-roman">${roman}</div>
          <div class="cns-type">${CHORD_TYPE_KR[ctype] ?? ctype}</div>
        </div>
        <div class="tone-chips">${toneChips}</div>
        ${piano}
        ${scaleCards}
      </div>`;
  });

  return html;
}

function openNoteModal(prog) {
  const modal = document.getElementById('note-modal');
  const box   = document.getElementById('note-modal-box');
  box.innerHTML = buildNoteModalContent(prog);
  modal.classList.add('open');
  document.body.style.overflow = 'hidden';

  box.querySelector('#modal-close-btn').addEventListener('click', closeNoteModal);
  modal.addEventListener('click', e => { if (e.target === modal) closeNoteModal(); });
}

function closeNoteModal() {
  document.getElementById('note-modal').classList.remove('open');
  document.body.style.overflow = '';
}

// Close modal on Escape key
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeNoteModal();
});

// ─── Boot ────────────────────────────────────────────────────────────────────
buildChips(GENRES, 'genre-chips', selectedGenres, render);
buildChips(MOODS,  'mood-chips',  selectedMoods,  render);
buildKeyButtons();
render();
</script>
